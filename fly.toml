app = "smart-attendance"
primary_region = "sin"   # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  PORT = "10000"
  HOST = "0.0.0.0"
  DUP_WINDOW_MIN = "3"
